name: Refresh model & deploy site

# Runs on a schedule (every 30 min during the tournament) and on manual trigger.
# Pulls the latest free results feed, refreshes the model + conditioned simulation,
# regenerates web/data.json, commits it, and publishes web/ to GitHub Pages.
on:
  schedule:
    - cron: "*/20 * * * *"   # every 20 min — comfortably longer than a run, avoids overlap

  workflow_dispatch: {}        # manual "Run workflow" button
  push:
    branches: [main]
    # Only code changes re-trigger a deploy. NOT web/data.json or reports/ — those are
    # written by the bot itself, and including them would make every auto-commit
    # re-trigger the workflow in an endless overlapping loop.
    paths: [scripts/**, src/**, web/index.html, web/style.css, web/app.js, '.github/workflows/**']

permissions:
  contents: write   # to commit refreshed data.json
  pages: write
  id-token: write

concurrency:
  group: refresh-and-deploy
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python + sync deps
        run: uv sync --frozen || uv sync

      - name: Refresh model, conditioned sim, and web data
        # The tuned recipe is injected from a repo secret so the PUBLIC repo never
        # contains it. Set it once: repo Settings -> Secrets and variables -> Actions
        # -> New secret named MODEL_CONFIG_JSON with the JSON from your local
        # model_config.json. Without it, CI would run the de-tuned baseline.
        # continue-on-error: a transient feed/network hiccup must not block the deploy;
        # the site then ships with the last good web/data.json from the repo.
        continue-on-error: true
        env:
          MODEL_CONFIG_JSON: ${{ secrets.MODEL_CONFIG_JSON }}
        run: uv run python scripts/refresh_model_and_site.py --simulations 1000

      - name: Commit refreshed data (if changed)
        # Never let a push race (concurrent runs / your manual pushes) fail the job —
        # the site deploy must still happen. Rebase-pull-retry, then swallow failure.
        continue-on-error: true
        run: |
          git config user.name "wc2026-bot"
          git config user.email "actions@github.com"
          git add web/data.json reports/ data/interim/ models/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: refresh model + site ($(date -u +%Y-%m-%dT%H:%MZ))"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "push attempt $i failed; retrying after rebase…"
              sleep 5
            done
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
